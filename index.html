<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🥚 Egg Hunt</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --dark: #111111;
  --card: #181818;
  --border: #2a2a2a;
  --lime: #c8f135;
  --lime-dark: #a8d020;
  --white: #ffffff;
  --gray: #888888;
  --light-gray: #cccccc;
  --found: #22c55e;
  --found-bg: #052010;
  --danger: #ef4444;
  --gold: #fbbf24;
  --admin-accent: #f97316;

  /* Admin */
  --parch: #fdf6e3;
  --parch-dark: #f0e4c0;
  --parch-darker: #e0d0a0;
  --grass: #2d6a2d;
  --grass-dark: #1a4a1a;
  --ink: #1a1a1a;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--black);
  min-height: 100vh;
  color: var(--white);
  overflow-x: hidden;
}

/* ============ SPLASH ============ */
.splash {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--black);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px;
}
.splash.hidden { display: none; }

.splash-badge {
  width: 100px; height: 100px;
  background: var(--lime);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px;
  margin-bottom: 32px;
  animation: pulse-badge 2s ease-in-out infinite;
  box-shadow: 0 0 0 0 rgba(200,241,53,0.4);
}
@keyframes pulse-badge {
  0%,100% { box-shadow: 0 0 0 0 rgba(200,241,53,0.4); }
  50% { box-shadow: 0 0 0 20px rgba(200,241,53,0); }
}

.splash-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--lime); margin-bottom: 8px;
}
.splash-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 56px; font-weight: 900;
  text-transform: uppercase; line-height: 0.95;
  color: var(--white); text-align: center;
  margin-bottom: 8px;
}
.splash-sub {
  font-size: 15px; color: var(--gray);
  margin-bottom: 56px; text-align: center;
}
.splash-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }

.splash-btn {
  width: 100%; padding: 20px 24px;
  border: none; border-radius: 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  cursor: pointer; display: flex; align-items: center;
  justify-content: space-between;
  transition: transform 0.12s, box-shadow 0.12s;
  -webkit-appearance: none;
}
.splash-btn:active { transform: scale(0.97); }
.splash-btn .btn-arrow { font-size: 20px; opacity: 0.6; }

.splash-btn.hider {
  background: var(--lime); color: var(--black);
  box-shadow: 0 8px 32px rgba(200,241,53,0.3);
}
.splash-btn.hunter {
  background: var(--white); color: var(--black);
  box-shadow: 0 8px 32px rgba(255,255,255,0.1);
}

/* ============ PIN ============ */
.pin-screen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--black);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px;
}
.pin-screen.hidden { display: none; }
.pin-eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--admin-accent); margin-bottom:8px; }
.pin-title { font-family:'Barlow Condensed',sans-serif; font-size:40px; font-weight:900; text-transform:uppercase; color:var(--white); margin-bottom:4px; }
.pin-sub { font-size:14px; color:var(--gray); margin-bottom:40px; }
.pin-dots { display:flex; gap:16px; margin-bottom:40px; }
.pin-dot { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:all 0.15s; }
.pin-dot.filled { background:var(--admin-accent); border-color:var(--admin-accent); box-shadow:0 0 12px rgba(249,115,22,0.5); }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:280px; }
.pin-key { padding:20px; border:none; border-radius:14px; background:var(--card); color:var(--white); font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:700; cursor:pointer; border:1px solid var(--border); transition:background 0.1s,transform 0.1s; -webkit-appearance:none; }
.pin-key:active { background:var(--admin-accent); transform:scale(0.94); }
.pin-key.del { font-size:18px; color:var(--gray); }
.pin-error { color:var(--danger); font-size:13px; font-weight:700; margin-top:16px; min-height:20px; letter-spacing:1px; }
.pin-back { margin-top:20px; background:transparent; border:none; color:var(--gray); font-family:'Barlow',sans-serif; font-size:14px; cursor:pointer; text-decoration:underline; }

/* ============ ADMIN SHELL ============ */
#admin-wrap { display:none; background:var(--parch); min-height:100vh; }

.admin-header {
  background: var(--parch);
  border-bottom: 3px solid var(--parch-darker);
  padding: 14px 16px 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
  font-family: 'Barlow', sans-serif;
  color: var(--ink);
}
.admin-header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.admin-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900; text-transform:uppercase; color:var(--grass-dark); display:flex; align-items:center; gap:8px; letter-spacing:1px; }
.admin-chips { display:flex; gap:6px; align-items:center; }
.achip { border-radius:20px; padding:4px 10px; font-size:12px; font-weight:700; color:white; }
.achip.total { background:var(--grass-dark); }
.achip.found { background:var(--found); }
.achip.money { background:var(--admin-accent); }
.sync-dot { width:8px; height:8px; border-radius:50%; background:var(--found); animation:pulse-green 2s infinite; }
.sync-dot.syncing { background:var(--gold); animation:pulse-orange 1s infinite; }
.sync-dot.error { background:var(--danger); animation:none; }
@keyframes pulse-green { 0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,0.3)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,0)} }
@keyframes pulse-orange { 0%,100%{box-shadow:0 0 0 2px rgba(251,191,36,0.3)} 50%{box-shadow:0 0 0 6px rgba(251,191,36,0)} }
.exit-btn { background:transparent; border:none; color:#aaa; font-size:12px; cursor:pointer; font-family:'Barlow',sans-serif; text-decoration:underline; }
.admin-tabs { display:flex; background:var(--parch-dark); border-radius:12px; padding:3px; gap:3px; }
.atab { flex:1; padding:8px 4px; border:none; background:transparent; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--grass-dark); border-radius:10px; cursor:pointer; transition:all 0.2s; -webkit-appearance:none; }
.atab.active { background:var(--parch); box-shadow:0 2px 8px rgba(0,0,0,0.1); }

.admin-main { padding:0 0 120px; }
.aview { display:none; }
.aview.active { display:block; }

/* Admin form */
.add-panel { background:var(--parch); margin:14px 12px; border-radius:20px; padding:20px; box-shadow:0 4px 16px rgba(0,0,0,0.08), 0 0 0 2px var(--parch-darker); }
.panel-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; text-transform:uppercase; color:var(--grass-dark); margin-bottom:20px; letter-spacing:1px; }
.field-group { margin-bottom:14px; }
.field-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--grass-dark); margin-bottom:6px; display:block; }
.field-input { width:100%; padding:12px 14px; border:2px solid var(--parch-darker); border-radius:12px; font-family:'Barlow',sans-serif; font-size:16px; background:white; color:var(--ink); outline:none; -webkit-appearance:none; }
.field-input:focus { border-color:var(--grass); }
.money-wrap { position:relative; }
.money-prefix { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:18px; font-weight:700; color:var(--grass-dark); }
.money-wrap .field-input { padding-left:28px; }
.gps-btn { width:100%; padding:14px; background:var(--grass); color:white; border:none; border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; -webkit-appearance:none; }
.gps-btn.locked { background:var(--found); }
.gps-btn.loading { opacity:0.7; }
.coords-display { background:#e8f5e9; border:2px solid #a5d6a7; border-radius:10px; padding:10px 14px; margin-top:8px; font-size:12px; font-weight:600; color:#2e7d32; display:none; font-family:'Courier New',monospace; }
.coords-display.visible { display:block; }
.photo-row { display:flex; gap:10px; align-items:stretch; }
.photo-btn { flex:1; min-height:52px; padding:10px; background:var(--parch-dark); border:2px dashed var(--parch-darker); border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; color:var(--grass-dark); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; -webkit-appearance:none; }
.photo-btn.has-photo { border-style:solid; border-color:var(--grass); background:#e8f5e9; }
.photo-thumb-prev { width:60px; height:60px; object-fit:cover; border-radius:10px; border:2px solid var(--grass); display:none; flex-shrink:0; }
.photo-thumb-prev.visible { display:block; }
.color-row { display:flex; gap:8px; flex-wrap:wrap; }
.cswatch { width:36px; height:36px; border-radius:50%; border:3px solid transparent; cursor:pointer; -webkit-appearance:none; }
.cswatch.selected { border-color:var(--ink); transform:scale(1.15); }
.save-btn { width:100%; padding:16px; background:var(--admin-accent); color:white; border:none; border-radius:14px; font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; text-transform:uppercase; letter-spacing:1px; cursor:pointer; -webkit-appearance:none; box-shadow:0 4px 16px rgba(249,115,22,0.4); }
.clear-btn { width:100%; padding:14px; background:transparent; color:var(--danger); border:2px solid var(--danger); border-radius:14px; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; text-transform:uppercase; letter-spacing:1px; cursor:pointer; -webkit-appearance:none; margin-top:8px; }
#camera-input { display:none; }

/* Admin list */
.list-controls { padding:12px 12px 6px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
.list-controls::-webkit-scrollbar { display:none; }
.fchip { flex-shrink:0; padding:6px 14px; border-radius:20px; border:2px solid var(--parch-darker); background:var(--parch); font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--grass-dark); cursor:pointer; -webkit-appearance:none; }
.fchip.active { background:var(--grass); border-color:var(--grass); color:white; }
.egg-list { padding:6px 12px; display:flex; flex-direction:column; gap:10px; }
.egg-card { background:var(--parch); border-radius:16px; overflow:hidden; border:2px solid var(--parch-darker); }
.egg-card.is-found { border-color:#a5d6a7; background:#f1f8e9; }
.egg-card-inner { display:flex; align-items:stretch; }
.egg-color-bar { width:6px; flex-shrink:0; }
.egg-card-body { flex:1; padding:12px 14px; min-width:0; }
.egg-card-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
.egg-num { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; text-transform:uppercase; color:var(--ink); }
.egg-money-tag { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; color:var(--admin-accent); }
.egg-coords { font-size:11px; color:#888; font-family:'Courier New',monospace; }
.egg-note { font-size:13px; color:#555; margin-top:3px; }
.found-badge { display:inline-flex; align-items:center; gap:3px; background:var(--found); color:white; border-radius:8px; padding:2px 8px; font-size:11px; font-weight:700; margin-top:4px; }
.egg-actions { display:flex; gap:6px; margin-top:10px; }
.eabtn { flex:1; padding:8px; border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; text-transform:uppercase; cursor:pointer; -webkit-appearance:none; }
.btn-found { background:var(--found); color:white; }
.btn-unfound { background:#f97316; color:white; }
.btn-nav { background:#3b82f6; color:white; }
.btn-delete { background:var(--danger); color:white; }
.btn-photo { background:var(--grass); color:white; }
.egg-photo-thumb { width:68px; flex-shrink:0; }
.egg-photo-thumb img { width:68px; height:100%; object-fit:cover; display:block; min-height:80px; cursor:pointer; }

/* Admin map */
.map-wrap { padding:12px; }
.map-box { background:var(--parch); border-radius:20px; overflow:hidden; border:2px solid var(--parch-darker); }
.map-hdr { padding:14px 16px 10px; }
.map-hdr-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; text-transform:uppercase; color:var(--grass-dark); }
.map-hdr-sub { font-size:12px; color:#888; }
#map-frame { width:100%; height:420px; border:none; display:block; }
.map-legend { padding:10px 16px; border-top:2px solid var(--parch-darker); display:flex; gap:16px; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--ink); }
.legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.map-egg-list { padding:0 12px 12px; display:flex; flex-direction:column; gap:8px; margin-top:12px; }
.map-egg-row { background:var(--parch); border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:10px; border:2px solid var(--parch-darker); }
.map-egg-dot { width:16px; height:16px; border-radius:50%; flex-shrink:0; border:2px solid rgba(0,0,0,0.1); }
.map-egg-info { flex:1; min-width:0; }
.map-egg-name { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800; text-transform:uppercase; color:var(--ink); }
.map-egg-coord { font-size:11px; color:#888; font-family:monospace; }
.map-nav-btn { background:var(--grass); color:white; border:none; border-radius:8px; padding:8px 12px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; text-transform:uppercase; cursor:pointer; -webkit-appearance:none; }

/* Admin empty */
.a-empty { text-align:center; padding:50px 20px; color:#888; }
.a-empty-icon { font-size:48px; display:block; margin-bottom:10px; }
.a-empty-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; color:#555; }

/* Admin photo modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; display:none; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--parch); border-radius:20px; padding:20px; max-width:400px; width:100%; max-height:85vh; overflow-y:auto; }
.modal-box img { width:100%; border-radius:12px; margin-bottom:12px; }
.modal-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; color:var(--grass-dark); margin-bottom:8px; text-transform:uppercase; }
.modal-detail { font-size:14px; color:#555; margin-bottom:6px; }
.modal-close { width:100%; margin-top:14px; padding:13px; background:var(--grass); color:white; border:none; border-radius:12px; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; text-transform:uppercase; cursor:pointer; -webkit-appearance:none; }

/* ============ HUNTER SHELL ============ */
#hunter-wrap {
  display: none;
  min-height: 100vh;
  background: var(--black);
  flex-direction: column;
}

/* Hunter header */
.h-header {
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 14px;
  position: sticky; top: 0; z-index: 100;
}
.h-header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.h-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--lime);
}
.h-prize-pill {
  background: var(--lime);
  color: var(--black);
  border-radius: 100px;
  padding: 6px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 900;
  letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 6px;
}
.h-stats-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
}
.h-stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 13px; font-weight: 700;
  color: var(--light-gray);
  display: flex; align-items: center; gap: 6px;
}
.h-stat .val { color: var(--white); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 900; }
.h-stat.green .val { color: var(--lime); }
.h-exit { background:transparent; border:none; color:var(--gray); font-size:12px; cursor:pointer; font-family:'Barlow',sans-serif; text-decoration:underline; }
.h-tabs {
  display: flex; gap: 8px;
}
.h-tab {
  flex: 1; padding: 10px; border: none;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--gray); cursor: pointer;
  transition: all 0.18s; -webkit-appearance: none;
}
.h-tab.active {
  background: var(--lime); color: var(--black);
  border-color: var(--lime);
}

.h-view { display: none; }
.h-view.active { display: block; }

/* Hunter map */
.h-map-wrap { padding: 12px 12px 0; }
.h-map-box { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
#hunter-map-frame { width: 100%; height: 420px; border: none; display: block; }
.h-map-legend {
  background: var(--card); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 20px 20px;
  padding: 10px 16px; display: flex; gap: 20px;
}
.h-legend-item { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--gray); }

/* Hunter egg list below map */
.h-egg-section {
  padding: 16px 12px 120px;
}
.h-section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--gray); margin-bottom: 12px;
  padding: 0 4px;
}
.h-filter-row { display:flex; gap:8px; margin-bottom:14px; }
.h-filter {
  padding: 6px 16px; border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; text-transform: uppercase;
  color: var(--gray); cursor: pointer; -webkit-appearance: none;
}
.h-filter.active { background: var(--lime); color: var(--black); border-color: var(--lime); }

.h-egg-grid { display: flex; flex-direction: column; gap: 10px; }

.h-egg-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.h-egg-card.is-found {
  background: var(--found-bg);
  border-color: rgba(34,197,94,0.3);
}
.h-egg-inner { display: flex; align-items: stretch; }
.h-color-stripe { width: 5px; flex-shrink: 0; }
.h-egg-content { flex: 1; padding: 16px 18px; }
.h-egg-top {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 12px;
}
.h-egg-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px; font-weight: 900;
  text-transform: uppercase; color: var(--white);
}
.h-found-pill {
  background: var(--found);
  color: white; border-radius: 100px;
  padding: 4px 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.5px;
}
.h-egg-btns { display: flex; gap: 8px; }
.h-found-btn {
  flex: 1; padding: 13px;
  border: none; border-radius: 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.5px;
  cursor: pointer; -webkit-appearance: none;
  transition: transform 0.1s;
}
.h-found-btn:active { transform: scale(0.96); }
.h-found-btn.claim { background: var(--lime); color: var(--black); }
.h-found-btn.claimed {
  background: rgba(34,197,94,0.1);
  color: rgba(34,197,94,0.5);
  border: 1px solid rgba(34,197,94,0.2);
}
.h-nav-btn {
  padding: 13px 16px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--white); border-radius: 12px;
  font-size: 18px; cursor: pointer; -webkit-appearance: none;
}
.h-empty {
  text-align: center; padding: 50px 20px; color: var(--gray);
}
.h-empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }
.h-empty-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; text-transform: uppercase; }

/* ============ CELEBRATION ============ */
.celebration-overlay {
  position: fixed; inset: 0; z-index: 5000;
  pointer-events: none;
  display: none;
}
.celebration-overlay.active { display: block; }

.celebration-content {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh;
  pointer-events: none;
  z-index: 5001;
}
.celebration-card {
  background: var(--lime);
  border-radius: 28px;
  padding: 36px 48px;
  text-align: center;
  transform: scale(0);
  animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
  box-shadow: 0 20px 80px rgba(200,241,53,0.5);
  pointer-events: all;
}
@keyframes pop-in {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.celeb-emoji { font-size: 64px; display: block; margin-bottom: 8px; }
.celeb-label { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: rgba(0,0,0,0.5); margin-bottom: 4px; }
.celeb-amount {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 80px; font-weight: 900; line-height: 1;
  color: var(--black);
}
.celeb-sub { font-size: 15px; color: rgba(0,0,0,0.6); margin-top: 6px; }
.celeb-close {
  margin-top: 20px; padding: 12px 32px;
  background: var(--black); color: var(--lime);
  border: none; border-radius: 100px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 900; text-transform: uppercase;
  cursor: pointer; pointer-events: all;
}

/* Confetti particles */
.confetti-piece {
  position: fixed;
  width: 10px; height: 16px;
  top: -20px;
  border-radius: 3px;
  animation: confetti-fall linear forwards;
  z-index: 5000;
}
@keyframes confetti-fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--dark); color: var(--white);
  padding: 12px 20px; border-radius: 100px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 700;
  z-index: 3000; opacity: 0;
  transition: all 0.3s;
  border: 1px solid var(--border);
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ADMIN -->
<div id="admin-wrap">
  <div class="admin-header">
    <div class="admin-header-top">
      <div class="admin-title">🧺 Egg Hider</div>
      <div class="admin-chips">
        <div style="display:flex;align-items:center;gap:4px;"><div class="sync-dot" id="sync-dot"></div></div>
        <div class="achip total" id="stat-total">🥚 0</div>

  <div class="admin-main">
    <!-- HIDE EGG TAB -->
    <div class="aview active" id="aview-add">
      <div class="add-panel">

        <div class="field-group">

            <button class="cswatch selected" data-color="#f5c842" style="background:#f5c842" onclick="selectColor(this)"></button>
            <button class="cswatch" data-color="#f084a0" style="background:#f084a0" onclick="selectColor(this)"></button>
            <button class="cswatch" data-color="#7ab8e8" style="background:#7ab8e8" onclick="selectColor(this)"></button>
            <button class="cswatch" data-color="#b07ad4" style="background:#b07ad4" onclick="selectColor(this)"></button>
            <button class="cswatch" data-color="#5aa55a" style="background:#5aa55a" onclick="selectColor(this)"></button>
            <button class="cswatch" data-color="#ff7043" style="background:#ff7043" onclick="selectColor(this)"></button>
            <button class="cswatch" data-color="#c8a97e" style="background:#c8a97e" onclick="selectColor(this)"></button>

        </div>
        <div class="field-group">
          <label class="field-label">📸 Photo (Optional)</label>
          <div class="photo-row">
            <button class="photo-btn" id="photo-btn" onclick="document.getElementById('camera-input').click()">
              <span>📷</span><span id="photo-btn-text">Take Photo</span>
            </button>
            <img class="photo-thumb-prev" id="photo-thumb" src="" alt="">
          </div>
          <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handlePhoto(this)">
        </div>
        <div class="field-group">
          <label class="field-label">📝 Notes (Optional)</label>
          <input type="text" class="field-input" id="egg-note" placeholder="e.g. Under the big rock…" autocomplete="off">

        <button class="save-btn" onclick="saveEgg()">🥚 Save Egg Location</button>
        <button class="clear-btn" onclick="clearAllEggs()">🗑️ Clear All Eggs & Start Over</button>

    </div>
    <!-- LIST TAB -->
    <div class="aview" id="aview-list">
      <div class="list-controls">
        <button class="fchip active" data-filter="all" onclick="setAdminFilter(this)">All</button>
        <button class="fchip" data-filter="hidden" onclick="setAdminFilter(this)">🥚 Hidden</button>

    <!-- MAP TAB -->
    <div class="aview" id="aview-map">
      <div class="map-wrap">
        <div class="map-box">
          <div class="map-hdr">
            <div class="map-hdr-title">🗺️ Egg Map</div>
            <div class="map-hdr-sub" id="map-sub">No eggs yet</div>
          </div>
          <iframe id="map-frame" src="about:blank"></iframe>
          <div class="map-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#f5c842;border:2px solid #888;"></div>Hidden</div>
            <div class="legend-item"><div class="legend-dot" style="background:#22c55e;border:2px solid #166534;"></div>Found</div>

  <div class="h-header">
    <div class="h-header-top">

        <button class="h-exit" onclick="goSplash()">Exit</button>

    <div class="h-stats-row">
      <div class="h-stat"><span>Total</span><span class="val" id="h-total">0</span></div>
      <div class="h-stat green"><span>Found</span><span class="val" id="h-found">0</span></div>

          <div class="h-legend-item"><div class="legend-dot" style="background:#f5c842;border:2px solid #888;width:10px;height:10px;border-radius:50%;"></div>Not Found</div>
          <div class="h-legend-item"><div class="legend-dot" style="background:#22c55e;border:2px solid #166534;width:10px;height:10px;border-radius:50%;"></div>Found</div>

    <!-- Eggs listed below map -->

      <div class="h-filter-row">
        <button class="h-filter active" data-filter="all" onclick="setHunterFilter(this,'map')">All</button>
        <button class="h-filter" data-filter="hidden" onclick="setHunterFilter(this,'map')">🥚 Not Found</button>
        <button class="h-filter" data-filter="found" onclick="setHunterFilter(this,'map')">✅ Found</button>

  <div class="h-view" id="hview-list">

      <div class="h-filter-row">
        <button class="h-filter active" data-filter="all" onclick="setHunterFilter(this,'list')">All</button>
        <button class="h-filter" data-filter="hidden" onclick="setHunterFilter(this,'list')">🥚 Not Found</button>
        <button class="h-filter" data-filter="found" onclick="setHunterFilter(this,'list')">✅ Found</button>

</div>

<!-- PHOTO MODAL -->
<div class="modal-overlay" id="photo-modal">
  <div class="modal-box">
    <img id="modal-photo" src="" alt="">
    <div class="modal-title" id="modal-name"></div>
    <div class="modal-detail" id="modal-coords"></div>
    <div class="modal-detail" id="modal-note"></div>
    <div class="modal-detail" id="modal-money"></div>
    <button class="modal-close" id="modal-close-btn">Close</button>
  </div>
</div>

<!-- CELEBRATION -->
<div class="celebration-overlay" id="celebration-overlay">
  <div class="celebration-content">
    <div class="celebration-card" id="celebration-card">
      <span class="celeb-emoji">🎉</span>
      <div class="celeb-label">You Found</div>
      <div class="celeb-amount" id="celeb-amount">$0</div>
      <div class="celeb-sub" id="celeb-sub">Egg #1</div>
      <button class="celeb-close" onclick="closeCelebration()">Awesome! 🎊</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7Fd5E_yUytUEnxZB28OzIBmcom4FJ6xQ",
  authDomain: "egg-hunter-app.firebaseapp.com",
  projectId: "egg-hunter-app",
  storageBucket: "egg-hunter-app.firebasestorage.app",
  messagingSenderId: "745473505002",
  appId: "1:745473505002:web:faf8f4bec2000d67c20993"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const EGG_DOC = doc(db, 'hunts', 'main');
const ADMIN_PIN = '2025';

let eggs = [];
let currentMode = null;
let currentLat = null, currentLng = null, currentAccuracy = null;
let currentPhoto = null;
let selectedColor = '#f5c842';
let adminFilter = 'all';
let hunterFilterMap = 'all';
let hunterFilterList = 'all';
let lastSavedJSON = '';
let eggCounter = 0;
let pinEntry = '';

// ===== NAVIGATION =====
function goSplash() {
  document.getElementById('splash').classList.remove('hidden');
  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('hunter-wrap').style.display = 'none';
  currentMode = null; pinEntry = ''; updatePinDots();
}
function goHider() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('pin-screen').classList.remove('hidden');
  pinEntry = ''; updatePinDots();
  document.getElementById('pin-error').textContent = '';
}
function goHunter() {
  document.getElementById('splash').classList.add('hidden');
  currentMode = 'hunter';
  document.getElementById('hunter-wrap').style.display = 'flex';
  renderHunterAll();
}
function goAdmin() {
  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('admin-wrap').style.display = 'block';
  currentMode = 'admin';
  renderAdminAll();
}

// ===== PIN =====
function pinKey(d) {
  if (pinEntry.length >= 4) return;
  pinEntry += d; updatePinDots();
  if (pinEntry.length === 4) setTimeout(checkPin, 150);
}
function pinDel() { pinEntry = pinEntry.slice(0,-1); updatePinDots(); document.getElementById('pin-error').textContent = ''; }
function updatePinDots() {
  for (let i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot'+(i<pinEntry.length?' filled':'');
}
function checkPin() {
  if (pinEntry === ADMIN_PIN) { goAdmin(); }
  else { document.getElementById('pin-error').textContent = '❌ WRONG PIN — TRY AGAIN'; pinEntry=''; updatePinDots(); }
}

// ===== FIREBASE =====
function startSync() {
  updateSyncDot('syncing');
  onSnapshot(EGG_DOC, (snap) => {
    if (snap.exists()) {
      const raw = snap.data().eggs || [];
      eggCounter = snap.data().counter || raw.length;
      const incoming = mergePhotos(raw);
      const incomingJSON = JSON.stringify(raw);
      if (incomingJSON !== lastSavedJSON) {
        const wasEmpty = eggs.length === 0;
        eggs = incoming; lastSavedJSON = incomingJSON;
        if (currentMode === 'admin') renderAdminAll();
        if (currentMode === 'hunter') renderHunterAll();
        if (!wasEmpty) showToast('🔄 Eggs updated!');
      }
    } else { eggs = []; if (currentMode==='admin') renderAdminAll(); if (currentMode==='hunter') renderHunterAll(); }
    updateSyncDot('ok');
  }, () => { updateSyncDot('error'); showToast('⚠️ Connection issue.'); });
}

async function saveEggs() {
  try {
    updateSyncDot('syncing');
    const photoMap = {};
    eggs.forEach(e => { if (e.photo) photoMap[e.id] = e.photo; });
    try { localStorage.setItem('egg-photos', JSON.stringify(photoMap)); } catch(e) {}
    const clean = eggs.map(({photo,...r})=>r);
    const json = JSON.stringify(clean);
    await setDoc(EGG_DOC, { eggs: clean, counter: eggCounter, updatedAt: new Date().toISOString() });
    lastSavedJSON = json; updateSyncDot('ok');
  } catch(e) { updateSyncDot('error'); showToast('⚠️ Save failed.'); }
}

function mergePhotos(list) {
  try { const m=JSON.parse(localStorage.getItem('egg-photos')||'{}'); return list.map(e=>({...e,photo:m[e.id]||null})); }
  catch { return list; }
}
function updateSyncDot(s) { const d=document.getElementById('sync-dot'); if(d) d.className='sync-dot '+s; }

// ===== ADMIN TABS =====
function switchAdminTab(name) {
  document.querySelectorAll('.aview').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));
  document.getElementById('aview-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name==='map') renderAdminMap();
  if (name==='list') renderAdminList();
}

// ===== GPS =====
function lockLocation() {
  const btn=document.getElementById('gps-btn'),icon=document.getElementById('gps-icon'),text=document.getElementById('gps-text'),disp=document.getElementById('coords-display');
  btn.classList.add('loading'); icon.textContent='⏳'; text.textContent='Getting GPS…';
  navigator.geolocation.getCurrentPosition(
    pos => { currentLat=pos.coords.latitude; currentLng=pos.coords.longitude; currentAccuracy=Math.round(pos.coords.accuracy); btn.classList.remove('loading'); btn.classList.add('locked'); icon.textContent='✅'; text.textContent='Location Locked!'; disp.textContent=`📍 ${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}  ±${currentAccuracy}m`; disp.classList.add('visible'); showToast('📍 Location locked!'); },
    () => { btn.classList.remove('loading'); icon.textContent='⚠️'; text.textContent='GPS Failed – Tap to Retry'; showToast('⚠️ GPS failed. Check permissions.'); },
    {enableHighAccuracy:true,timeout:12000,maximumAge:0}
  );
}

// ===== PHOTO =====
function handlePhoto(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image(); img.onload=()=>{ const c=document.createElement('canvas'),s=Math.min(1,800/img.width); c.width=img.width*s; c.height=img.height*s; c.getContext('2d').drawImage(img,0,0,c.width,c.height); currentPhoto=c.toDataURL('image/jpeg',0.7); document.getElementById('photo-thumb').src=currentPhoto; document.getElementById('photo-thumb').classList.add('visible'); document.getElementById('photo-btn').classList.add('has-photo'); document.getElementById('photo-btn-text').textContent='Photo Taken ✓'; showToast('📸 Photo captured!'); }; img.src=e.target.result; };
  reader.readAsDataURL(file);
}

function selectColor(el) { document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('selected')); el.classList.add('selected'); selectedColor=el.dataset.color; }

// ===== SAVE EGG =====
function saveEgg() {
  const money=parseFloat(document.getElementById('egg-money').value)||0;
  const note=document.getElementById('egg-note').value.trim();
  if (!currentLat) { showToast('⚠️ Lock your GPS first!'); return; }
  eggCounter++;
  const egg = { id:Date.now().toString(), num:eggCounter, money, note, lat:currentLat, lng:currentLng, accuracy:currentAccuracy, color:selectedColor, photo:currentPhoto, found:false, createdAt:new Date().toISOString() };
  eggs.push(egg); saveEggs(); renderAdminAll(); resetForm();
  showToast(`🥚 Egg #${eggCounter} hidden! $${money.toFixed(2)} inside.`);
}

function resetForm() {
  document.getElementById('egg-money').value=''; document.getElementById('egg-note').value='';
  document.getElementById('coords-display').classList.remove('visible'); document.getElementById('coords-display').textContent='';
  document.getElementById('gps-btn').classList.remove('locked','loading'); document.getElementById('gps-icon').textContent='📡'; document.getElementById('gps-text').textContent='Lock My Location';
  document.getElementById('photo-thumb').classList.remove('visible'); document.getElementById('photo-btn').classList.remove('has-photo'); document.getElementById('photo-btn-text').textContent='Take Photo';
  document.getElementById('camera-input').value=''; currentLat=null; currentLng=null; currentPhoto=null;
  document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('selected')); document.querySelector('.cswatch').classList.add('selected'); selectedColor='#f5c842';
}

// ===== CLEAR ALL =====
function clearAllEggs() {
  if (!confirm('⚠️ Delete ALL eggs and start over? This cannot be undone.')) return;
  eggs=[]; eggCounter=0; lastSavedJSON='';
  try { localStorage.removeItem('egg-photos'); } catch(e) {}
  saveEggs(); renderAdminAll(); showToast('🗑️ All eggs cleared!');
}

// ===== ADMIN FOUND/UNFOUND/DELETE =====
function adminMarkFound(id) { const e=eggs.find(x=>x.id===id); if(e){e.found=true;e.foundAt=new Date().toISOString();saveEggs();renderAdminAll();showToast(`✅ Egg #${e.num} found!`);} }
function adminMarkUnfound(id) { const e=eggs.find(x=>x.id===id); if(e){e.found=false;e.foundAt=null;saveEggs();renderAdminAll();showToast(`↩️ Egg #${e.num} rehidden.`);} }
function deleteEgg(id) { const e=eggs.find(x=>x.id===id); if(!e) return; if(!confirm(`Delete Egg #${e.num}?`)) return; eggs=eggs.filter(x=>x.id!==id); saveEggs(); renderAdminAll(); showToast(`🗑️ Egg #${e.num} deleted.`); }
function setAdminFilter(el) { document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); adminFilter=el.dataset.filter; renderAdminList(); }

// ===== ADMIN RENDER =====
function renderAdminAll() { updateAdminStats(); renderAdminList(); }
function updateAdminStats() {
  const total=eggs.length, found=eggs.filter(e=>e.found).length, money=eggs.reduce((s,e)=>s+(e.money||0),0);
  document.getElementById('stat-total').textContent=`🥚 ${total}`;
  document.getElementById('stat-found').textContent=`✓ ${found}`;
  document.getElementById('stat-money').textContent=`$${money.toFixed(0)}`;
}

function renderAdminList() {
  const container=document.getElementById('egg-list');
  let filtered=eggs;
  if(adminFilter==='hidden') filtered=eggs.filter(e=>!e.found);
  if(adminFilter==='found') filtered=eggs.filter(e=>e.found);
  if(filtered.length===0){container.innerHTML=`<div class="a-empty"><span class="a-empty-icon">🌿</span><div class="a-empty-title">No eggs here</div></div>`;return;}
  container.innerHTML=filtered.map(egg=>`
    <div class="egg-card ${egg.found?'is-found':''}">
      <div class="egg-card-inner">
        <div class="egg-color-bar" style="background:${egg.color}"></div>
        <div class="egg-card-body">
          <div class="egg-card-top">
            <div class="egg-num">Egg #${egg.num||'?'}</div>
            ${egg.money>0?`<div class="egg-money-tag">$${egg.money.toFixed(2)}</div>`:''}
          </div>
          ${egg.lat?`<div class="egg-coords">📍 ${egg.lat.toFixed(5)}, ${egg.lng.toFixed(5)}${egg.accuracy?` ±${egg.accuracy}m`:''}</div>`:''}
          ${egg.note?`<div class="egg-note">📝 ${escHtml(egg.note)}</div>`:''}
          ${egg.found?`<div class="found-badge">✅ Found ${egg.foundAt?formatTime(egg.foundAt):''}</div>`:''}
          <div class="egg-actions">
            ${!egg.found?`<button class="eabtn btn-found" onclick="adminMarkFound('${egg.id}')">✅ Found</button>`:`<button class="eabtn btn-unfound" onclick="adminMarkUnfound('${egg.id}')">↩️ Rehide</button>`}
            ${egg.lat?`<button class="eabtn btn-nav" onclick="navTo(${egg.lat},${egg.lng})">🧭 Nav</button>`:''}
            ${egg.photo?`<button class="eabtn btn-photo" onclick="showPhoto('${egg.id}')">📷</button>`:''}
            <button class="eabtn btn-delete" onclick="deleteEgg('${egg.id}')">🗑️</button>
          </div>
        </div>
        ${egg.photo?`<div class="egg-photo-thumb"><img src="${egg.photo}" alt="" onclick="showPhoto('${egg.id}')"></div>`:''}
      </div>
    </div>`).join('');
}

function buildMapHTML(geoEggs, isAdmin) {
  const coordCount={};
  const markers=geoEggs.map(egg=>{
    const color=egg.found?'#22c55e':(egg.color||'#f5c842');
    const key=egg.lat.toFixed(4)+','+egg.lng.toFixed(4);
    coordCount[key]=(coordCount[key]||0)+1;
    const n=coordCount[key],angle=(n-1)*2.4,radius=n===1?0:0.00008*Math.ceil((n-1)/6);
    const lat=egg.lat+radius*Math.cos(angle),lng=egg.lng+radius*Math.sin(angle);
    const popup=isAdmin?`Egg #${egg.num||'?'}${egg.money>0?' — $'+egg.money.toFixed(2):''}${egg.note?'<br><small>'+escHtml(egg.note)+'</small>':''}`:`<b>Egg #${egg.num||'?'}</b>${egg.found?'<br><span style="color:#22c55e">✅ Found!</span>':'<br><span style="color:#fbbf24">🥚 Not Found Yet</span>'}`;
    return `var m${egg.id.slice(-6)}=L.circleMarker([${lat},${lng}],{radius:13,fillColor:"${color}",color:"#fff",weight:2.5,opacity:1,fillOpacity:0.95}).addTo(map);m${egg.id.slice(-6)}.bindPopup('${popup}');`;
  }).join('\n');
  const avgLat=geoEggs.reduce((s,e)=>s+e.lat,0)/geoEggs.length;
  const avgLng=geoEggs.reduce((s,e)=>s+e.lng,0)/geoEggs.length;
  return `<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script><style>body,html{margin:0;padding:0;}#map{width:100%;height:100vh;}</style></head><body><div id="map"></div><script>var map=L.map('map',{zoomControl:true}).setView([${avgLat},${avgLng}],17);L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19}).addTo(map);${markers}var g=L.featureGroup([${geoEggs.map(e=>`L.circleMarker([${e.lat},${e.lng}],{radius:1})`).join(',')}]);map.fitBounds(g.getBounds().pad(0.2));<\/script></body></html>`;
}

function renderAdminMap() {
  const geo=eggs.filter(e=>e.lat);
  document.getElementById('map-sub').textContent=geo.length>0?`${geo.length} eggs on map`:'No GPS eggs yet';
  if(!geo.length){document.getElementById('map-frame').src='about:blank';document.getElementById('map-egg-list').innerHTML='';return;}
  document.getElementById('map-frame').srcdoc=buildMapHTML(geo,true);
  document.getElementById('map-egg-list').innerHTML=geo.map(egg=>`
    <div class="map-egg-row">
      <div class="map-egg-dot" style="background:${egg.found?'#22c55e':egg.color}"></div>
      <div class="map-egg-info">
        <div class="map-egg-name">Egg #${egg.num||'?'}${egg.money>0?` — $${egg.money.toFixed(2)}`:''}</div>
        <div class="map-egg-coord">${egg.lat.toFixed(5)}, ${egg.lng.toFixed(5)}</div>
      </div>
      <button class="map-nav-btn" onclick="navTo(${egg.lat},${egg.lng})">🧭 Nav</button>
    </div>`).join('');
}

// ===== PHOTO MODAL =====
function showPhoto(id) {
  const egg=eggs.find(e=>e.id===id); if(!egg||!egg.photo) return;
  document.getElementById('modal-photo').src=egg.photo;
  document.getElementById('modal-name').textContent=`🥚 Egg #${egg.num||'?'}`;
  document.getElementById('modal-coords').textContent=egg.lat?`📍 ${egg.lat.toFixed(6)}, ${egg.lng.toFixed(6)}`:'';
  document.getElementById('modal-note').textContent=egg.note?`📝 ${egg.note}`:'';
  document.getElementById('modal-money').textContent=egg.money>0?`💰 $${egg.money.toFixed(2)} inside`:'';
  document.getElementById('photo-modal').classList.add('open');
}
function closeModal() { document.getElementById('photo-modal').classList.remove('open'); }
document.getElementById('modal-close-btn').addEventListener('click', closeModal);

// ===== HUNTER =====
function switchHunterTab(name) {
  document.querySelectorAll('.h-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.h-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('hview-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if(name==='map') renderHunterMap();
  if(name==='list') renderHunterEggGrid('list');
}

function setHunterFilter(el, context) {
  const row=el.closest('.h-filter-row');
  row.querySelectorAll('.h-filter').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  if(context==='map') { hunterFilterMap=el.dataset.filter; renderHunterEggGrid('map'); }
  else { hunterFilterList=el.dataset.filter; renderHunterEggGrid('list'); }
}

function renderHunterAll() { updateHunterStats(); renderHunterMap(); renderHunterEggGrid('map'); renderHunterEggGrid('list'); }

function updateHunterStats() {
  const total=eggs.length, found=eggs.filter(e=>e.found).length;
  const unclaimed=eggs.filter(e=>!e.found).reduce((s,e)=>s+(e.money||0),0);
  document.getElementById('h-total').textContent=total;
  document.getElementById('h-found').textContent=found;
  document.getElementById('h-remaining').textContent=total-found;
  document.getElementById('h-unclaimed').textContent=`💰 $${unclaimed.toFixed(0)} left`;
}

function renderHunterMap() {
  const geo=eggs.filter(e=>e.lat);
  updateHunterStats();
  if(!geo.length){document.getElementById('hunter-map-frame').src='about:blank';return;}
  document.getElementById('hunter-map-frame').srcdoc=buildMapHTML(geo,false);
}

function renderHunterEggGrid(context) {
  const filter=context==='map'?hunterFilterMap:hunterFilterList;
  const containerId=context==='map'?'h-egg-grid-map':'h-egg-grid-list';
  const container=document.getElementById(containerId);
  let filtered=eggs;
  if(filter==='hidden') filtered=eggs.filter(e=>!e.found);
  if(filter==='found') filtered=eggs.filter(e=>e.found);
  if(!filtered.length){container.innerHTML=`<div class="h-empty"><span class="h-empty-icon">${filter==='found'?'🎉':'🌿'}</span><div class="h-empty-title">${filter==='found'?'None found yet!':'All found!'}</div></div>`;return;}
  container.innerHTML=filtered.map(egg=>`
    <div class="h-egg-card ${egg.found?'is-found':''}">
      <div class="h-egg-inner">
        <div class="h-color-stripe" style="background:${egg.color}"></div>
        <div class="h-egg-content">
          <div class="h-egg-top">
            <div class="h-egg-num">🥚 Egg #${egg.num||'?'}</div>
            ${egg.found?`<div class="h-found-pill">✅ Found</div>`:''}
          </div>
          <div class="h-egg-btns">
            ${!egg.found
              ?`<button class="h-found-btn claim" onclick="hunterClaim('${egg.id}')">🎉 I Found It!</button>`
              :`<button class="h-found-btn claimed" onclick="hunterUnclaim('${egg.id}')">↩️ Undo</button>`
            }
            ${egg.lat?`<button class="h-nav-btn" onclick="navTo(${egg.lat},${egg.lng})">🧭</button>`:''}
          </div>
        </div>
      </div>
    </div>`).join('');
}

function hunterClaim(id) {
  const egg=eggs.find(e=>e.id===id); if(!egg||egg.found) return;
  egg.found=true; egg.foundAt=new Date().toISOString();
  saveEggs(); renderHunterAll();
  launchCelebration(egg);
}
function hunterUnclaim(id) {
  const egg=eggs.find(e=>e.id===id); if(!egg) return;
  egg.found=false; egg.foundAt=null;
  saveEggs(); renderHunterAll(); showToast(`↩️ Egg #${egg.num} unmarked.`);
}

// ===== CELEBRATION =====
function launchCelebration(egg) {
  document.getElementById('celeb-amount').textContent=egg.money>0?`$${egg.money.toFixed(2)}`:'🎊';
  document.getElementById('celeb-sub').textContent=`Egg #${egg.num||'?'} — Congratulations!`;
  const overlay=document.getElementById('celebration-overlay');
  overlay.classList.add('active');
  // Reset card animation
  const card=document.getElementById('celebration-card');
  card.style.animation='none'; void card.offsetWidth;
  card.style.animation='pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards';
  spawnConfetti();
}
function closeCelebration() {
  document.getElementById('celebration-overlay').classList.remove('active');
  document.querySelectorAll('.confetti-piece').forEach(el=>el.remove());
}

function spawnConfetti() {
  const colors=['#c8f135','#f5c842','#f084a0','#7ab8e8','#b07ad4','#ff7043','#ffffff','#22c55e'];
  const emojis=['💵','💰','🤑','💸'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const piece=document.createElement('div');
      const isEmoji=Math.random()>0.6;
      if(isEmoji){
        piece.style.cssText=`position:fixed;font-size:${20+Math.random()*16}px;left:${Math.random()*100}vw;top:-30px;z-index:5000;animation:confetti-fall ${2+Math.random()*2}s linear forwards;`;
        piece.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      } else {
        piece.className='confetti-piece';
        piece.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;width:${6+Math.random()*8}px;height:${10+Math.random()*14}px;`;
      }
      document.getElementById('celebration-overlay').appendChild(piece);
      setTimeout(()=>piece.remove(),5000);
    },i*30);
  }
}

// ===== UTILS =====
function navTo(lat,lng) { window.open(`https://maps.apple.com/?daddr=${lat},${lng}&dirflg=w&t=m`,'_blank'); }
function setAdminFilterEvent(el) { setAdminFilter(el); }
let toastTimer;
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function formatTime(iso) { const d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }

// ===== EXPOSE GLOBALS =====
window.goHider=goHider; window.goHunter=goHunter; window.goSplash=goSplash;
window.pinKey=pinKey; window.pinDel=pinDel;
window.switchAdminTab=switchAdminTab; window.lockLocation=lockLocation;
window.handlePhoto=handlePhoto; window.selectColor=selectColor;
window.saveEgg=saveEgg; window.clearAllEggs=clearAllEggs;
window.adminMarkFound=adminMarkFound; window.adminMarkUnfound=adminMarkUnfound;
window.deleteEgg=deleteEgg; window.navTo=navTo;
window.setAdminFilter=setAdminFilter; window.showPhoto=showPhoto; window.closeModal=closeModal;
window.switchHunterTab=switchHunterTab; window.setHunterFilter=setHunterFilter;
window.hunterClaim=hunterClaim; window.hunterUnclaim=hunterUnclaim;
window.closeCelebration=closeCelebration;

// ===== INIT =====
startSync();
</script>
